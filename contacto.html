<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Biografía</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="icon" href="Imagenes/Favicon.jpg" type="image/x-icon">
</head>


<body>

  <div class="containerRegresar">
    <a href="index.html" class="regresar">Regresar</a>
  </div>


    <h5>Formulario de Contacto</h5>
    
    
    <form action="/enviar-formulario" method="POST">
      
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre aquí" required><br><br>
      
      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email" placeholder="Escribe tu correo aquí" required><br><br>
      
      <label for="telefono">Teléfono:</label>
      <input type="tel" id="telefono" name="telefono" placeholder="Escribe tu teléfono aquí" required><br><br>
      
      <label for="mensaje">Mensaje:</label><br>
      <textarea id="mensaje" name="mensaje" rows="4" cols="50" required></textarea><br><br>
      
      <label for="suscripcion">¿Quieres recibir nuestro boletín?</label>
      <input type="checkbox" id="suscripcion" name="suscripcion"><br><br>
      
      <label>Preferencias de contacto:</label><br>
      <input type="radio" id="contacto_email" name="contacto" value="email">
      <label for="contacto_email">Correo electrónico</label><br>
      <input type="radio" id="contacto_telefono" name="contacto" value="telefono">
      <label for="contacto_telefono">Teléfono</label><br><br>
      
      <button type="submit">Enviar</button>
    </form>
  
  </body>
</html>
